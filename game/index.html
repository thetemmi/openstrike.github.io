<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPEN-STRIKE | IN-GAME</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Roboto+Mono&display=swap');
        :root { --primary: #00f2ff; --bg-glass: rgba(10, 20, 30, 0.7); --border: rgba(0, 242, 255, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { overflow: hidden; background: #000; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #game-canvas { display: block; }

        /* Crosshair & Hitmarker */
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; pointer-events: none; z-index: 10; display: none; }
        #crosshair .dot { position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: var(--primary); border-radius: 50%; transform: translate(-50%, -50%); }
        #crosshair .line { position: absolute; background: var(--primary); opacity: 0.8; }
        #crosshair .top, #crosshair .bottom { width: 2px; height: 6px; left: 50%; transform: translateX(-50%); }
        #crosshair .left, #crosshair .right { width: 6px; height: 2px; top: 50%; transform: translateY(-50%); }
        #crosshair .top { top: -8px; } #crosshair .bottom { bottom: -8px; }
        #crosshair .left { left: -8px; } #crosshair .right { right: -8px; }

        #hitmarker { position: fixed; top: 50%; left: 50%; width: 24px; height: 24px; pointer-events: none; transform: translate(-50%, -50%) rotate(45deg); display: none; opacity: 0; transition: opacity 0.05s; z-index: 15; }
        #hitmarker .line { position: absolute; background: #fff; box-shadow: 0 0 5px #f00; }
        #hitmarker .line1 { top: 0; left: 11px; width: 2px; height: 6px; }
        #hitmarker .line2 { bottom: 0; left: 11px; width: 2px; height: 6px; }
        #hitmarker .line3 { top: 11px; left: 0; width: 6px; height: 2px; }
        #hitmarker .line4 { top: 11px; right: 0; width: 6px; height: 2px; }

        /* HUD */
        #hud { position: fixed; bottom: 30px; left: 30px; right: 30px; display: flex; justify-content: space-between; pointer-events: none; z-index: 20; }
        .hud-panel { background: var(--bg-glass); backdrop-filter: blur(10px); border-left: 4px solid var(--primary); padding: 15px 25px; color: #fff; }
        .hud-panel .label { font-size: 12px; letter-spacing: 2px; color: var(--primary); margin-bottom: 5px; }
        .hud-panel .value { font-family: 'Roboto Mono', monospace; font-size: 32px; font-weight: 700; }
        .health .bar-container { width: 200px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 10px; }
        .health .bar { width: 100%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        /* Blocker */
        #blocker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; cursor: pointer; }
        #instructions { text-align: center; color: #fff; padding: 40px; border: 1px solid var(--border); background: rgba(0,242,255,0.05); transition: background 0.3s; }
        #instructions:hover { background: rgba(0,242,255,0.1); }
        #instructions h1 { font-size: 48px; letter-spacing: 10px; margin-bottom: 20px; color: var(--primary); text-shadow: 0 0 20px var(--primary); }
        #instructions p { font-size: 20px; margin-bottom: 10px; }
        #instructions .controls { margin-top: 30px; font-size: 14px; color: rgba(255,255,255,0.6); line-height: 2; }

        /* Loading */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; color: var(--primary); }
        .loader { width: 50px; height: 50px; border: 3px solid rgba(0,242,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Debug */
        #debug { position: fixed; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.7); padding: 8px; font-family: monospace; font-size: 12px; z-index: 9999; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <div id="crosshair">
            <div class="dot"></div>
            <div class="line top"></div>
            <div class="line bottom"></div>
            <div class="line left"></div>
            <div class="line right"></div>
        </div>

        <div id="hitmarker">
            <div class="line line1"></div>
            <div class="line line2"></div>
            <div class="line line3"></div>
            <div class="line line4"></div>
        </div>

        <div id="hud">
            <div class="hud-panel health">
                <div class="label">HEALTH</div>
                <div class="value" id="hp-value">100</div>
                <div class="bar-container"><div class="bar" id="hp-bar"></div></div>
            </div>
            <div class="hud-panel ammo">
                <div class="label">AK-47</div>
                <div class="value" id="ammo-value">30 / 90</div>
            </div>
            <div id="room-id-panel" style="position: fixed; top: 20px; right: 20px; background: var(--bg-glass); border-right: 4px solid var(--primary); padding: 10px 20px; color: #fff; text-align: right; pointer-events: auto; display: none;">
                <div style="font-size: 10px; color: var(--primary); letter-spacing: 1px;">LOBBY ID</div>
                <div id="room-id-value" style="font-family: 'Roboto Mono', monospace; font-size: 18px; cursor: pointer;">GENERATING...</div>
            </div>
        </div>

        <div id="blocker">
            <div id="instructions">
                <h1>OPEN-STRIKE</h1>
                <p>CLICK TO DEPLOY</p>
                <div class="controls">
                    (W, A, S, D) - MOVE<br>
                    (SPACE) - JUMP<br>
                    (SHIFT) - CROUCH<br>
                    (MOUSE) - LOOK &amp; SHOOT<br>
                    (ESC) - PAUSE
                </div>
            </div>
        </div>

        <div id="loading-screen">
            <div class="loader"></div>
            <p>LOADING SECTOR...</p>
        </div>
    </div>

    <div id="debug">INIT...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        const dbg = document.getElementById('debug');
        dbg.textContent = 'MODULE LOADED OK';

        // ─── SCENE ──────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.001, 1000);
        camera.position.set(-17.498, 0.842, 3.014);
        scene.add(camera);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // ─── VIEWMODEL SCENE (Custom FOV) ───────────────────────────
        const uiScene = new THREE.Scene();
        const uiCamera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.001, 100);
        
        uiScene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const uiSun = new THREE.DirectionalLight(0xffffff, 1.5);
        uiSun.position.set(50, 100, 50);
        uiScene.add(uiSun);

        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.autoClear = false; // Allow multiple render passes

        // ─── POINTER LOCK (raw API) ─────────────────────────────────
        let locked = false;
        const blocker = document.getElementById('blocker');
        const crosshair = document.getElementById('crosshair');

        blocker.addEventListener('click', () => {
            canvas.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            locked = (document.pointerLockElement === canvas);
            blocker.style.display = locked ? 'none' : 'flex';
            crosshair.style.display = locked ? 'block' : 'none';
        });

        // ─── INPUT ──────────────────────────────────────────────────
        const keys = {};
        window.addEventListener('keydown', e => { keys[e.code] = true; });
        window.addEventListener('keyup',   e => { keys[e.code] = false; });

        let mouseDX = 0, mouseDY = 0;
        document.addEventListener('mousemove', e => {
            if (!locked) return;
            mouseDX += (e.movementX || 0);
            mouseDY += (e.movementY || 0);
        });

        // ─── CAMERA LOOK ────────────────────────────────────────────
        let yaw = 0, pitch = 0;
        const SENSITIVITY = 0.002;

        // ─── PHYSICS & RAYCASTING (Source Engine Style) ──────────────
        const velocity = new THREE.Vector3();
        const GRAVITY = 0.001;
        const JUMP_FORCE = 0.020; 
        const FLOOR_Y = 0.842;
        let canJump = true;
        let isDead = false;
        let lastTime = performance.now();

        const MAX_SPEED_GROUND = 0.010;
        const MAX_SPEED_AIR = 0.0015;
        const ACCEL_GROUND = 0.15;
        const ACCEL_AIR = 0.3;
        const FRICTION = 0.15;

        // Crouch state
        const STAND_Y = 0.842;
        const CROUCH_Y = 0.72;
        let isCrouching = false;
        let currentFloorY = STAND_Y;

        function accelerate(wishDir, wishSpeed, accel) {
            const currentSpeed = velocity.dot(wishDir);
            const addSpeed = wishSpeed - currentSpeed;
            if (addSpeed <= 0) return;
            
            let accelSpeed = accel * wishSpeed;
            if (accelSpeed > addSpeed) accelSpeed = addSpeed;
            
            velocity.addScaledVector(wishDir, accelSpeed);
        }

        const raycaster = new THREE.Raycaster();
        const shootables = [];
        const collidables = [];    // All solid objects (player collision)
        const mapCollidables = []; // Map walls only (bot LOS)
        const hitmarkerUI = document.getElementById('hitmarker');
        function showHitmarker() {
            hitmarkerUI.style.display = 'block';
            hitmarkerUI.style.opacity = '1';
            clearTimeout(hitmarkerUI.timeout);
            hitmarkerUI.timeout = setTimeout(() => { hitmarkerUI.style.opacity = '0'; }, 80);
        }

        // ─── PLAYER HEALTH ──────────────────────────────────────────
        let playerHealth = 100;
        function damagePlayer(amount) {
            if (playerHealth <= 0 || isDead) return;
            playerHealth -= amount;
            document.getElementById('hp-value').textContent = playerHealth;
            document.getElementById('hp-bar').style.width = Math.max(0, playerHealth) + '%';
            
            // Visual damage flash
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0'; flash.style.left = '0';
            flash.style.width = '100%'; flash.style.height = '100%';
            flash.style.background = 'rgba(255, 0, 0, 0.3)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '50';
            flash.style.transition = 'opacity 0.2s';
            document.body.appendChild(flash);
            setTimeout(() => { flash.style.opacity = '0'; }, 50);
            setTimeout(() => { flash.remove(); }, 250);

            if (playerHealth <= 0) {
                playerHealth = 0;
                isDead = true;
                document.getElementById('hp-value').textContent = 0;
                sendNetworkData({ type: 'die', id: peer.id });
                
                // Death Overlay
                const deathScreen = document.createElement('div');
                deathScreen.id = 'death-overlay';
                deathScreen.style.position = 'fixed';
                deathScreen.style.top = '0'; deathScreen.style.left = '0';
                deathScreen.style.width = '100%'; deathScreen.style.height = '100%';
                deathScreen.style.background = 'rgba(150, 0, 0, 0.5)';
                deathScreen.style.display = 'flex';
                deathScreen.style.flexDirection = 'column';
                deathScreen.style.justifyContent = 'center';
                deathScreen.style.alignItems = 'center';
                deathScreen.style.color = '#fff';
                deathScreen.style.zIndex = '1000';
                deathScreen.innerHTML = '<h1 style="font-size: 64px; margin-bottom: 20px;">WASTED</h1><p style="font-size: 24px;">RESPAWNING IN 3 SECONDS...</p>';
                document.body.appendChild(deathScreen);

                // Drop camera to floor
                const floorTween = setInterval(() => {
                    if (camera.position.y > 0.2) camera.position.y -= 0.05;
                    else clearInterval(floorTween);
                }, 16);
                
                // Respawn logic
                setTimeout(() => {
                    isDead = false;
                    const overlay = document.getElementById('death-overlay');
                    if (overlay) overlay.remove();

                    playerHealth = 100;
                    document.getElementById('hp-value').textContent = 100;
                    document.getElementById('hp-bar').style.width = '100%';
                    camera.position.set(-17.498, 0.842, 3.014); // original spawn
                    yaw = 0; pitch = 0;
                    
                    // Refill current weapon ammo
                    const w = weapons[currentWeaponKey];
                    if (!w.isMelee) {
                        w.ammo = w.maxAmmo;
                        w.reserve = (w.id === 'ak47') ? 90 : 48;
                    }
                    updateWeaponUI();
                    isReloading = false;
                    
                    sendNetworkData({ type: 'respawn', id: peer.id, state: { x: camera.position.x, y: camera.position.y, z: camera.position.z, yaw: yaw, pitch: pitch, hp: 100 } });
                }, 3000);
            }
        }

        // ─── WEAPONS SYSTEM ─────────────────────────────────────────
        const weapons = {
            1: { key: 1, id: 'ak47', name: 'AK-47', ammo: 30, maxAmmo: 30, reserve: 90, fireRate: 100, damage: 20, isMelee: false, file: '../ak47.glb', scale: 0.005, pos: new THREE.Vector3(0.015, -0.015, -0.040), rot: new THREE.Euler(0.05, (Math.PI / 2) + 0.15, 0.1), model: null },
            2: { key: 2, id: 'usp', name: 'USP-S', ammo: 12, maxAmmo: 12, reserve: 48, fireRate: 250, damage: 15, isMelee: false, file: '../usp.glb', scale: 0.00015, pos: new THREE.Vector3(0.012, -0.012, -0.035), rot: new THREE.Euler(0.02, -Math.PI / 2 + 0.05, 0.05), model: null },
            3: { key: 3, id: 'knife', name: 'KNIFE', ammo: 0, maxAmmo: 0, reserve: 0, fireRate: 500, damage: 55, isMelee: true, file: '../knife.glb', scale: 0.003, pos: new THREE.Vector3(0.015, -0.005, -0.040), rot: new THREE.Euler(0, -Math.PI / 2, -Math.PI / 2), model: null }
        };
        let currentWeaponKey = 1;

        let bobTimer = 0;
        let swayX = 0, swayY = 0;
        let reloadOffsetY = 0, reloadRotX = 0; // Procedural animation offsets

        function updateWeaponUI() {
            const w = weapons[currentWeaponKey];
            document.querySelector('.ammo .label').textContent = w.name;
            if (w.isMelee) {
                document.getElementById('ammo-value').textContent = '- / -';
            } else {
                document.getElementById('ammo-value').textContent = w.ammo + ' / ' + w.reserve;
            }
        }

        function switchWeapon(key) {
            if (isReloading || !weapons[key] || !weapons[key].model || key === currentWeaponKey) return;
            weapons[currentWeaponKey].model.visible = false;
            currentWeaponKey = key;
            weapons[currentWeaponKey].model.visible = true;
            updateWeaponUI();
        }

        // ─── LOAD ASSETS ────────────────────────────────────────────
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
        const loader = new GLTFLoader();
        loader.setDRACOLoader(dracoLoader);

        dbg.textContent = 'LOADING MAP...';

        // Load Weapons
        let loadedWeapons = 0;
        Object.values(weapons).forEach(w => {
            loader.load(w.file, gltf => {
                w.model = gltf.scene;
                w.model.scale.setScalar(w.scale);
                w.model.position.copy(w.pos);
                w.model.rotation.copy(w.rot);
                w.model.visible = (w.key === currentWeaponKey);
                uiScene.add(w.model);
                loadedWeapons++;
                if (loadedWeapons === 3) dbg.textContent = 'ALL WEAPONS LOADED';
                if (w.key === currentWeaponKey) updateWeaponUI();
            }, undefined, err => { dbg.textContent = w.name + ' ERROR: ' + err.message; });
        });

        // Load Map
        loader.load('../map.glb', gltf => {
            scene.add(gltf.scene);
            gltf.scene.traverse(child => {
                if (child.isMesh) {
                    collidables.push(child);
                    mapCollidables.push(child); // Map walls only
                }
            });
            document.getElementById('loading-screen').style.display = 'none';
            dbg.textContent = 'READY — CLICK TO DEPLOY';
        }, undefined, err => { dbg.textContent = 'MAP ERROR: ' + err.message; });

        // ─── AI BOTS ────────────────────────────────────────────────
        // ─── MULTIPLAYER NETWORKING (PeerJS) ───────────────────────
        const remotePlayers = new Map();
        let peer = null;
        let connections = []; // For Host: list of all clients. For Client: single connection to host.
        let isHost = false;
        
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const targetHostId = params.get('hostId');

        class RemotePlayer {
            constructor(id) {
                this.id = id;
                this.hp = 100;
                this.isAlive = true;
                
                // Create a container group
                this.mesh = new THREE.Group();
                this.mesh.userData = { isRemotePlayer: true, id: id, root: this.mesh, instance: this };
                
                // Add a simple temporary box so they are visible immediately
                const markerGeo = new THREE.BoxGeometry(0.3, 1.2, 0.3);
                const markerMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true });
                this.marker = new THREE.Mesh(markerGeo, markerMat);
                this.marker.position.set(0, 0.6, 0); 
                this.mesh.add(this.marker);

                // For interpolation
                this.targetPos = new THREE.Vector3();
                this.targetYaw = 0;
                this.targetPitch = 0;

                scene.add(this.mesh);
                // Note: We'll add to shootables/collidables once we have a real mesh or just use the marker
                shootables.push(this.marker);
                this.marker.userData.root = this.mesh;
            }

            setModel(model) {
                // Remove marker
                this.mesh.remove(this.marker);
                shootables.splice(shootables.indexOf(this.marker), 1);

                this.model = model;
                this.model.scale.setScalar(0.002);
                this.mesh.add(this.model);

                this.model.traverse(child => {
                    if (child.isMesh) {
                        child.userData.root = this.mesh;
                        collidables.push(child);
                        shootables.push(child);
                    }
                });
            }

            updateState(state) {
                if (!this.isAlive) return;
                this.targetPos.set(state.x, state.y - 0.14, state.z); // Adjust eye height to feet
                this.targetYaw = state.yaw;
                this.targetPitch = state.pitch;
                if (state.hp !== undefined) this.hp = state.hp;
            }

            takeDamage(amount) {
                if (!this.isAlive) return;
                showHitmarker();
                if (isHost) {
                    processHit(this.id, amount);
                } else {
                    sendNetworkData({ type: 'hit', targetId: this.id, damage: amount });
                }
            }

            update(now, timeScale) {
                if (!this.isAlive) return;
                // Framerate-independent interpolation
                const lerpFactor = 1 - Math.pow(1 - 0.2, timeScale);
                this.mesh.position.lerp(this.targetPos, lerpFactor);
                this.mesh.rotation.y = this.targetYaw + Math.PI;
            }

            die() {
                if (!this.isAlive) return;
                this.isAlive = false;
                let deathRot = 0;
                const fallInt = setInterval(() => {
                    deathRot += 0.15;
                    this.mesh.rotation.x = -deathRot;
                    this.mesh.position.y -= 0.005;
                    if (deathRot > Math.PI / 2) clearInterval(fallInt);
                }, 16);
                
                // Remove from collidables
                for (let i = collidables.length - 1; i >= 0; i--) {
                    if (collidables[i].userData.root === this.mesh) {
                        collidables.splice(i, 1);
                    }
                }
            }

            respawn(state) {
                this.isAlive = true;
                this.hp = 100;
                this.mesh.rotation.x = 0;
                this.updateState(state);
                this.mesh.position.copy(this.targetPos);
                
                // Re-add to collidables
                this.mesh.traverse(child => {
                    if (child.isMesh && !collidables.includes(child)) {
                        collidables.push(child);
                    }
                });
            }
        }

        function initNetworking() {
            peer = new Peer();

            peer.on('open', id => {
                dbg.textContent = 'NETWORK READY';
                if (mode === 'host') {
                    isHost = true;
                    document.getElementById('room-id-panel').style.display = 'block';
                    const idVal = document.getElementById('room-id-value');
                    idVal.textContent = id;
                    idVal.onclick = () => {
                        navigator.clipboard.writeText(id);
                        idVal.textContent = 'COPIED!';
                        setTimeout(() => idVal.textContent = id, 1000);
                    };
                } else if (mode === 'join' && targetHostId) {
                    dbg.textContent = 'CONNECTING TO HOST...';
                    const conn = peer.connect(targetHostId);
                    setupConnection(conn);
                }
            });

            peer.on('connection', conn => {
                if (isHost) {
                    setupConnection(conn);
                }
            });

            peer.on('error', err => {
                console.error('PeerJS Error:', err);
                dbg.innerHTML += `<br><span style="color:red">ERR: ${err.type}</span>`;
            });
        }

        function setupConnection(conn) {
            console.log('Setting up connection with:', conn.peer);
            
            // Check for existing connection to this peer to avoid duplicates
            const existing = connections.find(c => c.peer === conn.peer);
            if (existing) {
                console.log('Closing duplicate connection to:', conn.peer);
                existing.close();
                connections = connections.filter(c => c !== existing);
            }

            connections.push(conn);
            
            // For Host: send own ID immediately to let the client know who we are
            if (isHost) {
                // Wait a tiny bit for the data channel to be ready on the other side
                setTimeout(() => {
                    if (conn.open) {
                        console.log('HOST SENDING INIT TO:', conn.peer);
                        conn.send({ type: 'init', id: peer.id });
                    }
                }, 500);
            }

            conn.on('open', () => {
                console.log('Connection OPEN with:', conn.peer);
                if (!isHost) {
                    console.log('CLIENT SENDING JOIN TO:', conn.peer);
                    conn.send({ type: 'join', id: peer.id });
                }
            });

            conn.on('data', data => {
                handleNetworkMessage(data, conn);
            });

            conn.on('close', () => {
                console.log('Connection CLOSED with:', conn.peer);
                removePlayer(conn.peer);
                connections = connections.filter(c => c !== conn);
            });

            conn.on('error', err => {
                console.error('Connection ERROR with:', conn.peer, err);
            });
        }

        function handleNetworkMessage(data, conn) {
            console.log('NET RECV from', conn.peer, ':', data.type, data);
            const senderId = data.id || conn.peer;

            switch(data.type) {
                case 'init':
                    // Client receives this from Host
                    console.log('RECEIVED INIT FROM HOST:', senderId);
                    createRemotePlayer(senderId);
                    // Reply with join
                    conn.send({ type: 'join', id: peer.id });
                    break;

                case 'join':
                    console.log('RECEIVED JOIN FROM:', senderId);
                    if (isHost) {
                        // Broadcast new player to others
                        broadcast({ type: 'playerJoined', id: senderId }, conn);
                        // Tell new player about existing players
                        remotePlayers.forEach((p, id) => {
                            if (p instanceof RemotePlayer) {
                                conn.send({ type: 'playerJoined', id: id });
                            }
                        });
                    }
                    createRemotePlayer(senderId);
                    break;
                
                case 'update':
                    if (isHost) {
                        // Relay to all other clients
                        broadcast({ type: 'update', id: data.id, state: data.state }, conn);
                    }
                    const p = remotePlayers.get(data.id);
                    if (p && p instanceof RemotePlayer) p.updateState(data.state);
                    break;

                case 'hit':
                    if (isHost) {
                        processHit(data.targetId, data.damage);
                    } else if (data.targetId === peer.id) {
                        // The Host validated a hit on us!
                        damagePlayer(data.damage);
                    }
                    break;

                case 'die':
                    if (data.id === peer.id) {
                        // Handled locally
                    } else {
                        const target = remotePlayers.get(data.id);
                        if (target) target.die();
                    }
                    break;

                case 'respawn':
                    if (isHost) broadcast(data, conn);
                    if (data.id !== peer.id) {
                        const target = remotePlayers.get(data.id);
                        if (target) target.respawn(data.state);
                    }
                    break;

                case 'playerJoined':
                    createRemotePlayer(data.id);
                    break;
            }
        }

        function createRemotePlayer(id) {
            console.log('CREATING REMOTE PLAYER:', id);
            if (!id || id === peer.id) return;
            if (remotePlayers.has(id)) return;
            
            // Create player immediately with box
            const p = new RemotePlayer(id);
            remotePlayers.set(id, p);
            
            console.log('LOADING MODEL ASYNCHRONOUSLY FOR:', id);
            loader.load('../terrorist.glb', gltf => {
                console.log('MODEL LOADED FOR:', id);
                p.setModel(gltf.scene);
            }, undefined, err => {
                console.error('Model Load Error for', id, ':', err);
                // Keep the box marker if model fails
            });
        }
        window.remotePlayers = remotePlayers; // For console debugging

        function removePlayer(id) {
            const p = remotePlayers.get(id);
            if (p) {
                scene.remove(p.mesh);
                // Remove from collidables/shootables
                shootables.splice(shootables.indexOf(p.mesh), 1);
                remotePlayers.delete(id);
            }
        }

        function processHit(targetId, damage) {
            if (!isHost) return;
            
            if (targetId === peer.id) {
                damagePlayer(damage);
            } else {
                const target = remotePlayers.get(targetId);
                if (target && target instanceof RemotePlayer) {
                    target.hp -= damage;
                    console.log(`Player ${targetId} hit! HP: ${target.hp}`);
                    
                    // Command the target client to take damage locally
                    broadcast({ type: 'hit', targetId: targetId, damage: damage });
                    
                    if (target.hp <= 0) {
                        broadcast({ type: 'die', id: targetId });
                        target.die();
                    } else {
                        broadcast({ type: 'update', id: targetId, state: { hp: target.hp } });
                    }
                }
            }
        }

        function broadcast(data, excludeConn = null) {
            connections.forEach(conn => {
                if (conn !== excludeConn) conn.send(data);
            });
        }

        function sendNetworkData(data) {
            if (!peer) return;
            if (isHost) {
                broadcast(data);
            } else if (connections[0]) {
                connections[0].send(data);
            }
        }

        initNetworking();



        // ─── SHOOTING & RELOADING ───────────────────────────────────
        let isShooting = false;
        let isReloading = false;
        let lastShootTime = 0;
        
        window.addEventListener('keydown', e => { 
            if (isDead) return;
            keys[e.code] = true; 
            if (e.code === 'KeyR' && locked) reloadWeapon();
            if (e.code === 'Digit1' && locked) switchWeapon(1);
            if (e.code === 'Digit2' && locked) switchWeapon(2);
            if (e.code === 'Digit3' && locked) switchWeapon(3);
        });

        document.addEventListener('mousedown', e => {
            if (!locked || e.button !== 0 || isDead) return;
            const w = weapons[currentWeaponKey];
            if (!w.isMelee && w.ammo <= 0 && !isReloading) reloadWeapon();
            else isShooting = true;
        });

        document.addEventListener('mouseup', e => {
            if (e.button === 0) isShooting = false;
        });

        function reloadWeapon() {
            const w = weapons[currentWeaponKey];
            if (isReloading || w.isMelee || w.ammo === w.maxAmmo || w.reserve === 0) return;
            isReloading = true;
            isShooting = false;
            
            let startTime = performance.now();
            
            function animateReload() {
                const elapsed = performance.now() - startTime;
                
                if (elapsed < 400) {
                    // Dip down off screen
                    reloadOffsetY = -(elapsed / 400) * 0.03;
                    reloadRotX = -(elapsed / 400) * 0.5;
                    requestAnimationFrame(animateReload);
                } else if (elapsed < 1600) {
                    // Hold off screen
                    reloadOffsetY = -0.03;
                    reloadRotX = -0.5;
                    requestAnimationFrame(animateReload);
                } else if (elapsed < 2000) {
                    // Rise back up
                    const progress = (elapsed - 1600) / 400;
                    reloadOffsetY = -0.03 + (progress * 0.03);
                    reloadRotX = -0.5 + (progress * 0.5);
                    requestAnimationFrame(animateReload);
                } else {
                    // Finish reload
                    reloadOffsetY = 0;
                    reloadRotX = 0;
                    
                    const w = weapons[currentWeaponKey];
                    const needed = w.maxAmmo - w.ammo;
                    const take = Math.min(needed, w.reserve);
                    w.ammo += take;
                    w.reserve -= take;
                    updateWeaponUI();
                    isReloading = false;
                }
            }
            requestAnimationFrame(animateReload);
        }

        // ─── GAME LOOP ──────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            let dt = (now - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; // Cap dt to avoid huge physics jumps
            lastTime = now;
            const timeScale = dt * 60; // Normalized multiplier (1.0 at 60fps)

            if (locked && !isDead) {
                // Mouse look
                yaw   -= mouseDX * SENSITIVITY;
                pitch -= mouseDY * SENSITIVITY;
                pitch = Math.max(-1.2, Math.min(1.2, pitch));
                mouseDX = 0;
                mouseDY = 0;

                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;

                // Movement Vectors
                const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
                const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));

                const wishDir = new THREE.Vector3();
                if (keys['KeyW']) wishDir.add(forward);
                if (keys['KeyS']) wishDir.sub(forward);
                if (keys['KeyA']) wishDir.sub(right);
                if (keys['KeyD']) wishDir.add(right);
                if (wishDir.lengthSq() > 0) wishDir.normalize();

                // Crouch
                isCrouching = !!keys['ShiftLeft'] || !!keys['ShiftRight'];
                const targetFloorY = isCrouching ? CROUCH_Y : STAND_Y;
                currentFloorY += (targetFloorY - currentFloorY) * 0.15;

                // Friction
                if (canJump) {
                    velocity.x *= Math.pow(1 - FRICTION, timeScale);
                    velocity.z *= Math.pow(1 - FRICTION, timeScale);
                }

                // Acceleration (slower when crouching)
                const groundSpeed = isCrouching ? MAX_SPEED_GROUND * 0.5 : MAX_SPEED_GROUND;
                if (canJump) {
                    accelerate(wishDir, groundSpeed, ACCEL_GROUND * timeScale);
                } else {
                    accelerate(wishDir, MAX_SPEED_AIR, ACCEL_AIR * timeScale);
                }

                // Jump
                if (keys['Space'] && canJump) { 
                    velocity.y = JUMP_FORCE; 
                    canJump = false; 
                }

                // Gravity
                velocity.y -= GRAVITY * timeScale;
                
                // Collision detection helper
                function canMove(dirVec) {
                    if (dirVec.lengthSq() < 0.000001) return true;
                    
                    const dir = dirVec.clone().normalize();
                    const radius = 0.08;
                    
                    // Ray at knee height
                    const low = camera.position.clone();
                    low.y = 0.74;
                    raycaster.set(low, dir);
                    let hit = raycaster.intersectObjects(mapCollidables, false);
                    if (hit.length > 0 && hit[0].distance < radius) return false;
                    
                    // Ray at chest height
                    const high = camera.position.clone();
                    high.y = 0.82;
                    raycaster.set(high, dir);
                    hit = raycaster.intersectObjects(mapCollidables, false);
                    if (hit.length > 0 && hit[0].distance < radius) return false;
                    
                    return true;
                }

                // Apply movement with sliding collision
                if (velocity.x !== 0) {
                    const dirX = new THREE.Vector3(velocity.x * timeScale, 0, 0);
                    if (canMove(dirX)) camera.position.x += velocity.x * timeScale;
                    else velocity.x = 0;
                }
                if (velocity.z !== 0) {
                    const dirZ = new THREE.Vector3(0, 0, velocity.z * timeScale);
                    if (canMove(dirZ)) camera.position.z += velocity.z * timeScale;
                    else velocity.z = 0;
                }

                camera.position.y += velocity.y * timeScale;
                if (camera.position.y <= currentFloorY) {
                    camera.position.y = currentFloorY;
                    velocity.y = 0;
                    canJump = true;
                }

                // Shooting
                const now = performance.now();
                const w = weapons[currentWeaponKey];
                
                // If it's not full-auto (USP), we only allow one shot per mousedown
                // Let's implement full auto only for AK for simplicity, or semi auto for USP by checking a flag.
                // For now, let's keep all weapons full-auto if mouse is held, or limit it.
                // Knives also "shoot" to hit.
                if (isShooting && !isReloading && now - lastShootTime > w.fireRate) {
                    if (w.isMelee || w.ammo > 0) {
                        if (!w.isMelee) {
                            w.ammo--;
                            updateWeaponUI();
                        }
                        lastShootTime = now;
                        
                        // Weapon recoil kick
                        if (w.model) {
                            w.model.position.z += 0.005; // Kick back toward camera
                            w.model.position.y += 0.001; // Kick up slightly
                            
                            // Return animation
                            setTimeout(() => { 
                                if (w.model) {
                                    w.model.position.z -= 0.005;
                                    w.model.position.y -= 0.001;
                                }
                            }, 50);
                        }
                        
                        // Camera recoil (less for USP/Knife)
                        if (!w.isMelee) {
                            pitch += 0.015 * (w.id === 'usp' ? 0.5 : 1); 
                            yaw += (Math.random() - 0.5) * 0.01 * (w.id === 'usp' ? 0.5 : 1);
                        }
                        
                        // Hit registration
                        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                        // Limit range for knife
                        const intersects = raycaster.intersectObjects(shootables, true);
                        if (intersects.length > 0) {
                            if (!w.isMelee || intersects[0].distance < 1.5) {
                                const hitRoot = intersects[0].object.userData.root;
                                if (hitRoot && hitRoot.userData.isRemotePlayer) {
                                    let actualDamage = w.damage;
                                    
                                    // Headshot Detection (Models are ~1.7 units tall)
                                    const hitY = intersects[0].point.y;
                                    const playerY = hitRoot.position.y;
                                    const relativeY = hitY - playerY;
                                    
                                    if (relativeY > 1.35) {
                                        actualDamage = 150; // Guaranteed one-shot
                                        console.log("HEADSHOT!");
                                        // Visual feedback for headshot could go here
                                    }

                                    hitRoot.userData.instance.takeDamage(actualDamage);
                                }
                            }
                        }
                        
                        // For semi-auto (USP) prevent holding
                        if (w.id === 'usp' || w.id === 'knife') {
                            isShooting = false; 
                        }
                    }
                }


                // Weapon sway and bob
                const isMoving = keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'];
                const wModel = weapons[currentWeaponKey].model;
                if (wModel) {
                    // Sway logic (weapon lags behind camera movement)
                    swayX += mouseDX * 0.00005;
                    swayY += mouseDY * 0.00005;
                    swayX = Math.max(-0.005, Math.min(0.005, swayX));
                    swayY = Math.max(-0.005, Math.min(0.005, swayY));
                    
                    swayX *= 0.8; // Return to center
                    swayY *= 0.8;

                    const wPos = weapons[currentWeaponKey].pos;
                    const wRot = weapons[currentWeaponKey].rot;

                    let targetX = wPos.x - swayX;
                    let targetY = wPos.y + swayY;

                    if (isMoving) {
                        bobTimer += 0.15 * timeScale;
                        targetY += Math.sin(bobTimer) * 0.0015;
                        targetX += Math.cos(bobTimer * 0.5) * 0.001;
                    } else {
                        bobTimer = 0;
                    }
                    
                    wModel.position.x += (targetX - wModel.position.x) * 0.2;
                    wModel.position.y += ((targetY + reloadOffsetY) - wModel.position.y) * 0.2;
                    
                    // Apply base rotation + reload procedural rotation
                    wModel.rotation.set(wRot.x + reloadRotX, wRot.y, wRot.z);
                }

                // Update remote players
                remotePlayers.forEach(p => {
                    if (p instanceof RemotePlayer) p.update(now, timeScale);
                });

                // Send network update for local player (every frame or throttle?)
                // Throttling to ~30fps for network sanity
                if (!window.lastNetUpdate || now - window.lastNetUpdate > 33) {
                    if (peer && peer.id) {
                        sendNetworkData({
                            type: 'update',
                            id: peer.id,
                            state: {
                                x: camera.position.x,
                                y: camera.position.y,
                                z: camera.position.z,
                                yaw: yaw,
                                pitch: pitch,
                                hp: playerHealth
                            }
                        });
                    }
                    window.lastNetUpdate = now;
                }
                
                // Debug
                const p = camera.position;
                const playerIds = Array.from(remotePlayers.keys());
                const playerInfo = playerIds.map(id => {
                    const rp = remotePlayers.get(id);
                    const status = (rp instanceof RemotePlayer) ? (rp.isAlive ? rp.hp + 'hp' : 'DEAD') : 'LOADING...';
                    const pos = (rp instanceof RemotePlayer) ? `${rp.mesh.position.x.toFixed(1)},${rp.mesh.position.z.toFixed(1)}` : '?.?';
                    return `PLAYER: ${id.substring(0,6)} [${status}] @ ${pos}`;
                }).join('<br>');
                
                dbg.innerHTML =
                    'LOCKED: ' + locked + '<br>' +
                    'MODE: ' + (isHost ? 'HOST' : 'CLIENT') + '<br>' +
                    'PEER ID: ' + (peer ? peer.id : '...') + '<br>' +
                    'CONNS: ' + connections.length + '<br>' +
                    'POS: ' + p.x.toFixed(2) + ', ' + p.y.toFixed(2) + ', ' + p.z.toFixed(2) + '<br>' +
                    (playerInfo || 'NO OTHER PLAYERS');
            }

            renderer.clear();
            renderer.render(scene, camera);
            
            renderer.clearDepth(); // Draw weapon ON TOP of walls
            renderer.render(uiScene, uiCamera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            uiCamera.aspect = innerWidth / innerHeight;
            uiCamera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
